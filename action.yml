name: 'Run Nodus'
description: 'Install nodus-lang and run .nd scripts, test suites, or format checks in CI'
author: 'Masterplanner25'

branding:
  icon: 'play'
  color: 'blue'

inputs:
  file:
    description: 'Path to a .nd file to execute with nodus run'
    required: false
    default: ''
  test-path:
    description: 'File or directory to run with nodus test'
    required: false
    default: ''
  fmt-check:
    description: 'Run nodus fmt --check on all .nd files in the workspace'
    required: false
    default: 'false'
  version:
    description: 'nodus-lang version to install (default: latest)'
    required: false
    default: ''
  args:
    description: 'Extra arguments appended to nodus run (ignored for test/fmt modes)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install nodus-lang
      shell: bash
      env:
        NODUS_VERSION: ${{ inputs.version }}
      run: |
        if [ -n "$NODUS_VERSION" ]; then
          pip install "nodus-lang==$NODUS_VERSION"
        else
          pip install nodus-lang
        fi
        nodus --version

    - name: Validate inputs
      shell: bash
      run: |
        if [ -z "${{ inputs.file }}" ] && \
           [ -z "${{ inputs.test-path }}" ] && \
           [ "${{ inputs.fmt-check }}" != "true" ]; then
          echo "::error title=nodus-run-action::At least one of 'file', 'test-path', or 'fmt-check: true' must be set."
          exit 1
        fi

    - name: nodus run
      if: inputs.file != ''
      shell: bash
      env:
        NODUS_FILE: ${{ inputs.file }}
        NODUS_ARGS: ${{ inputs.args }}
      run: nodus run "$NODUS_FILE" $NODUS_ARGS

    - name: nodus test
      if: inputs.test-path != ''
      shell: bash
      env:
        NODUS_TEST_PATH: ${{ inputs.test-path }}
      run: nodus test "$NODUS_TEST_PATH"

    - name: nodus fmt --check
      if: inputs.fmt-check == 'true'
      shell: bash
      run: |
        FILES=$(find . -name "*.nd" \
          -not -path "./.git/*" \
          -not -path "./.venv/*" \
          -not -path "./node_modules/*" \
          2>/dev/null)
        if [ -z "$FILES" ]; then
          echo "No .nd files found — skipping fmt check."
          exit 0
        fi
        echo "$FILES" | xargs nodus fmt --check
